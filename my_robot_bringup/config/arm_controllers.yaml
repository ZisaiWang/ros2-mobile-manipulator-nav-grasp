controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: position_controllers/JointGroupPositionController

arm_controller:
  ros__parameters:
    joints:
      - base_arm_base_joint
      - base_arm_arm1_joint
      - arm1_arm2_joint
      - gripper_left_finger_joint
      - gripper_right_finger_joint